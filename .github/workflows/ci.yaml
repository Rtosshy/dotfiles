name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - name: Check flake
        run: nix flake check --impure

      - name: Validate Lefthook config
        run: nix develop ./dev -c lefthook validate

      - name: Run hooks
        run: nix develop ./dev -c lefthook run pre-commit --all-files
