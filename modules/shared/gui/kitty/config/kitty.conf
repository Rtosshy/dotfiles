# kitty.conf 変更時に自動リロード (WezTerm の automatically_reload_config に対応)
auto_reload_config 0.1

# WezTerm/Ghostty と揃えたフォント設定
font_family      family="JetBrainsMonoNL Nerd Font Mono" style="Medium"
bold_font        family="JetBrainsMonoNL Nerd Font Mono" style="Bold"
italic_font      family="JetBrainsMonoNL Nerd Font Mono" style="Medium Italic"
bold_italic_font family="JetBrainsMonoNL Nerd Font Mono" style="Bold Italic"
font_size        20.0

# macOS のタイトルバーを非表示 (WezTerm の window_decorations = 'RESIZE' に対応)
hide_window_decorations titlebar-only

# テキストと外枠の間の余白 (デフォルト0だと描画領域が外枠に張り付く)
window_padding_width 20

# WezTerm と揃えた透過・ブラー設定 (background_opacity < 1 のときのみ background_blur が有効)
# background_opacity 0.45
# background_blur    40

# Tokyo Night カラーテーマ (WezTerm/Ghostty と揃えたパレット)
foreground            #c0caf5
background            #1a1b26
selection_foreground  #c0caf5
selection_background  #33467c
cursor                #c0caf5
cursor_text_color     #15161e
cursor_blink_interval 0

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# タブバーを上部に配置し、WezTerm と同じ配色・パワーライン風の見た目にする
tab_bar_edge         top
tab_bar_style        powerline
tab_powerline_style  angled
# タブバーをウィンドウの淵から少し離す (左右, 上/下の順)
tab_bar_margin_width  10
tab_bar_margin_height 10 0

active_tab_foreground    #FFFFFF
active_tab_background    #7aa2f7
inactive_tab_foreground  #FFFFFF
inactive_tab_background  #5c6d74

# splits レイアウトを既定にしないと --location=vsplit/hsplit によるペイン分割が使えない
enabled_layouts splits,*

# ペイン分割 (WezTerm の SplitHorizontal/SplitVertical に対応)
map ctrl+shift+backslash launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current

# ペイン間移動 (WezTerm の ActivatePaneDirection に対応)
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

